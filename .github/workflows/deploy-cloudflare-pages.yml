name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify CLI
        run: npm install -g mint@latest

      - name: Export static site
        run: mint export --output site.zip

      - name: Unpack site
        run: |
          unzip -q site.zip -d _unpack
          count=$(find _unpack -mindepth 1 -maxdepth 1 | wc -l)
          if [ "$count" -eq 1 ]; then
            nested=$(find _unpack -mindepth 1 -maxdepth 1)
            if [ -d "$nested" ]; then
              mv "$nested" site
              rmdir _unpack
            else
              mv _unpack site
            fi
          else
            mv _unpack site
          fi

      - name: Setup Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to create the project first, ignore if it already exists
          wrangler pages project create workflow-docs --production-branch=main || true

          wrangler pages deploy site \
            --project-name=workflow-docs \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="${{ github.event.head_commit.message }}"
